services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started

  migrate:
    build:
      context: ./services/xrp-hbar-apex
    command: python migration_runner.py --directory /app/migrations
    restart: "no"
    env_file:
      - .env.production
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: xrp_hbar_apex
      POSTGRES_USER: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./services/xrp-hbar-apex
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: xrp_hbar_apex
      POSTGRES_USER: postgres
      REDIS_URL: redis://redis:6379/0
      WORKER_QUEUE: jarvis:jobs
      WORKER_PROCESSING_QUEUE: jarvis:jobs:processing
      WORKER_DLQ: jarvis:jobs:dlq
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://localhost:8080/health', timeout=3).read()\nPY"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./services/xrp-hbar-apex
    command: python worker_runtime.py
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: xrp_hbar_apex
      POSTGRES_USER: postgres
      REDIS_URL: redis://redis:6379/0
      WORKER_QUEUE: jarvis:jobs
      WORKER_PROCESSING_QUEUE: jarvis:jobs:processing
      WORKER_DLQ: jarvis:jobs:dlq
      WORKER_MAX_RETRIES: 3
      WORKER_HEARTBEAT_SECONDS: 10
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: xrp_hbar_apex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xrp_hbar_apex"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
