name: DigitalOcean Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate required diagnostics secrets and variables
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DIGITALOCEAN_HOST: ${{ vars.DIGITALOCEAN_HOST || secrets.DIGITALOCEAN_HOST }}
          DIGITALOCEAN_DROPLET_ID: ${{ vars.DIGITALOCEAN_DROPLET_ID || secrets.DIGITALOCEAN_DROPLET_ID }}
        run: |
          set -eu
          if [ -z "$DIGITALOCEAN_ACCESS_TOKEN" ]; then
            echo "DIGITALOCEAN_ACCESS_TOKEN must be saved as an Actions Secret"
            exit 1
          fi
          if [ -z "$DIGITALOCEAN_HOST" ]; then
            echo "DIGITALOCEAN_HOST must be saved as an Actions Variable or Secret"
            exit 1
          fi
          if [ -z "$DIGITALOCEAN_DROPLET_ID" ]; then
            echo "DIGITALOCEAN_DROPLET_ID must be saved as an Actions Variable or Secret"
            exit 1
          fi

      - name: Read droplet metadata from DigitalOcean API
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DIGITALOCEAN_DROPLET_ID: ${{ vars.DIGITALOCEAN_DROPLET_ID || secrets.DIGITALOCEAN_DROPLET_ID }}
        run: |
          set -eu
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${DIGITALOCEAN_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/droplets/${DIGITALOCEAN_DROPLET_ID}" \
            | python3 - <<'PY'
          import json
          import sys
          data = json.load(sys.stdin)["droplet"]
          public_v4 = [n["ip_address"] for n in data.get("networks", {}).get("v4", []) if n.get("type") == "public"]
          print(f"droplet_id={data['id']}")
          print(f"name={data['name']}")
          print(f"status={data['status']}")
          print(f"region={data['region']['slug']}")
          print(f"image={data['image']['slug']}")
          print(f"public_ipv4={','.join(public_v4)}")
          PY

      - name: Probe SSH and public health endpoints
        env:
          DIGITALOCEAN_HOST: ${{ vars.DIGITALOCEAN_HOST || secrets.DIGITALOCEAN_HOST }}
          BASE_URL: ${{ vars.BASE_URL || secrets.BASE_URL }}
        run: |
          set -eu
          timeout 10 bash -c "</dev/tcp/${DIGITALOCEAN_HOST}/22" && echo "ssh_port=open" || echo "ssh_port=closed_or_unreachable"
          curl -I --max-time 15 "http://${DIGITALOCEAN_HOST}/health" || true
          curl -I --max-time 15 "http://${DIGITALOCEAN_HOST}/ready" || true
          curl -I --max-time 15 "http://${DIGITALOCEAN_HOST}/deployment/status" || true
          if [ -n "${BASE_URL:-}" ]; then
            curl -I --max-time 15 "${BASE_URL}/health" || true
            curl -I --max-time 15 "${BASE_URL}/ready" || true
            curl -I --max-time 15 "${BASE_URL}/deployment/status" || true
          fi
