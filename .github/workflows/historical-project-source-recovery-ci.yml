name: Historical Project Source Recovery CI

on:
  pull_request:
    paths:
      - "reconstruction/**"
      - "tests/**"
      - ".github/workflows/historical-project-source-recovery-ci.yml"
  push:
    branches: [main]
    paths:
      - "reconstruction/**"
      - "tests/**"
      - ".github/workflows/historical-project-source-recovery-ci.yml"

permissions:
  contents: read

jobs:
  recovery-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile recovery pipeline
        run: python -m py_compile reconstruction/recover_project_sources.py tests/test_recover_project_sources.py
      - name: Run recovery tests
        run: python -m unittest tests.test_recover_project_sources -v
      - name: Validate recovery manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('reconstruction/historical_project_source_recovery_manifest.json').read_text())
          assert data['status'] == 'PARTIAL_RAW_RECOVERY_PROVEN'
          assert data['archive']['archive_entries'] == 4070
          assert data['archive']['stream_files'] == 3314
          assert data['archive']['compression_folders'] == 2
          assert data['available_derivatives']['folder0_partial_raw']['partial_unpacked_bytes'] == 75000000
          assert data['completion_gates']['historical_file_tree_denominator'] == 'DONE_VERIFIED'
          assert data['completion_gates']['historical_module_domain_recovery'] == 'DONE_VERIFIED_FOR_ACCESSIBLE_PROJECT_SOURCES'
          assert data['completion_gates']['global_no_gaps'] == 'BLOCKED_SOURCE_BYTES'
          PY
