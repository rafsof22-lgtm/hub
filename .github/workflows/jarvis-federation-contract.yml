name: Jarvis Federation Contract CI

on:
  pull_request:
    paths:
      - 'federation/**'
      - 'tests/test_jarvis_contract.py'
      - 'tests/test_jarvis_runtime_route.py'
      - 'tests/test_source_discovery_runtime_route.py'
      - 'tests/test_worker_migration_runtime.py'
      - 'deployment/runtime-scaffold-pack/**'
      - '.github/workflows/jarvis-federation-contract.yml'

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime dependencies
        run: pip install -r deployment/runtime-scaffold-pack/services/xrp-hbar-apex/requirements.txt
      - name: Compile adapters routes worker and migrations
        run: python -m compileall federation deployment/runtime-scaffold-pack/services/xrp-hbar-apex tests/test_jarvis_contract.py tests/test_jarvis_runtime_route.py tests/test_source_discovery_runtime_route.py tests/test_worker_migration_runtime.py
      - name: Run contract and runtime tests
        run: python -m unittest tests.test_jarvis_contract tests.test_jarvis_runtime_route tests.test_source_discovery_runtime_route tests.test_worker_migration_runtime -v
      - name: Verify synchronized contract constants and routes
        run: |
          set -eu
          grep -q 'CONTRACT_VERSION = "1.0.0"' federation/jarvis_contract.py
          grep -q 'CONTRACT_VERSION = "1.0.0"' deployment/runtime-scaffold-pack/services/xrp-hbar-apex/jarvis_contract.py
          grep -q 'SERVICE_ID = "xrp-hbar-hub-runtime"' federation/jarvis_contract.py
          grep -q 'SERVICE_ID = "xrp-hbar-hub-runtime"' deployment/runtime-scaffold-pack/services/xrp-hbar-apex/jarvis_contract.py
          for route in source-discovery/status worker/status migrations/status outbound/status; do
            grep -q "\"/$route\"" federation/jarvis_contract.py
            grep -q "\"/$route\"" deployment/runtime-scaffold-pack/services/xrp-hbar-apex/jarvis_contract.py
          done
          cmp federation/jarvis_contract.py deployment/runtime-scaffold-pack/services/xrp-hbar-apex/jarvis_contract.py
      - name: Validate Compose release graph
        run: |
          set -eu
          docker compose --env-file deployment/runtime-scaffold-pack/.env.production.example \
            -f deployment/runtime-scaffold-pack/docker-compose.prod.yml config > /tmp/compose.yml
          grep -q 'migrate:' /tmp/compose.yml
          grep -q 'python worker_runtime.py' /tmp/compose.yml
          grep -q 'service_completed_successfully' deployment/runtime-scaffold-pack/docker-compose.prod.yml
      - name: Build production API image
        run: docker build -t hub-jarvis-contract:test deployment/runtime-scaffold-pack/services/xrp-hbar-apex
      - name: Verify worker and migration artifacts are packaged
        run: |
          set -eu
          docker run --rm --entrypoint sh hub-jarvis-contract:test -c 'test -f /app/worker_runtime.py && test -f /app/migration_runner.py && test -f /app/runtime_jobs.py && test -f /app/migrations/001_runtime_worker.sql'
      - name: Run ephemeral container contract smoke test
        run: |
          set -eu
          docker run -d --rm --name hub-jarvis-contract-test -p 18080:8080 hub-jarvis-contract:test
          trap 'docker logs hub-jarvis-contract-test || true; docker stop hub-jarvis-contract-test || true' EXIT
          python - <<'PY'
          import json
          import time
          import urllib.request

          urls = [
              'http://127.0.0.1:18080/health',
              'http://127.0.0.1:18080/.well-known/jarvis/health',
              'http://127.0.0.1:18080/.well-known/jarvis/capabilities',
              'http://127.0.0.1:18080/source-discovery/status',
              'http://127.0.0.1:18080/outbound/status',
          ]
          for _ in range(30):
              try:
                  with urllib.request.urlopen(urls[0], timeout=2) as response:
                      if response.status == 200:
                          break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('container did not become healthy')

          for url in urls:
              with urllib.request.urlopen(url, timeout=5) as response:
                  payload = json.load(response)
                  assert response.status == 200
                  if '/.well-known/jarvis/' in url:
                      assert payload['repository_id'] == 'hub'
                      assert payload['service_id'] == 'xrp-hbar-hub-runtime'
                      assert payload['contract_version'] == '1.0.0'
                  if '/source-discovery/status' in url:
                      assert payload['limits']['outbound_fetch'] is False
                      assert payload['limits']['automatic_promotion'] is False
                  if '/outbound/status' in url:
                      assert payload['status'] == 'safe_disabled'
                      assert payload['external_fetch_enabled'] is False
          PY
      - name: Verify no secret files are introduced
        run: |
          test ! -f .env
          test ! -f deployment/runtime-scaffold-pack/.env.production
