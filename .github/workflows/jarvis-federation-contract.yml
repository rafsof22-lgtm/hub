name: Jarvis Federation Contract CI

on:
  pull_request:
    paths:
      - 'federation/**'
      - 'tests/test_jarvis_contract.py'
      - '.github/workflows/jarvis-federation-contract.yml'

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile adapter
        run: python -m compileall federation tests/test_jarvis_contract.py
      - name: Run contract tests
        run: python -m unittest tests.test_jarvis_contract -v
      - name: Verify no secret files are introduced
        run: |
          test ! -f .env
          test ! -f deployment/runtime-scaffold-pack/.env.production
