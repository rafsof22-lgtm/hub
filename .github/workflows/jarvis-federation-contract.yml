name: Jarvis Federation Contract CI

on:
  pull_request:
    paths:
      - 'federation/**'
      - 'tests/test_jarvis_contract.py'
      - 'tests/test_jarvis_runtime_route.py'
      - 'tests/test_source_discovery_runtime_route.py'
      - 'deployment/runtime-scaffold-pack/services/xrp-hbar-apex/**'
      - '.github/workflows/jarvis-federation-contract.yml'

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime dependencies
        run: pip install -r deployment/runtime-scaffold-pack/services/xrp-hbar-apex/requirements.txt
      - name: Compile adapters and routes
        run: python -m compileall federation deployment/runtime-scaffold-pack/services/xrp-hbar-apex tests/test_jarvis_contract.py tests/test_jarvis_runtime_route.py tests/test_source_discovery_runtime_route.py
      - name: Run contract and runtime tests
        run: python -m unittest tests.test_jarvis_contract tests.test_jarvis_runtime_route tests.test_source_discovery_runtime_route -v
      - name: Verify synchronized contract constants
        run: |
          grep -q 'CONTRACT_VERSION = "1.0.0"' federation/jarvis_contract.py
          grep -q 'CONTRACT_VERSION = "1.0.0"' deployment/runtime-scaffold-pack/services/xrp-hbar-apex/jarvis_contract.py
          grep -q 'SERVICE_ID = "xrp-hbar-hub-runtime"' federation/jarvis_contract.py
          grep -q 'SERVICE_ID = "xrp-hbar-hub-runtime"' deployment/runtime-scaffold-pack/services/xrp-hbar-apex/jarvis_contract.py
          grep -q '"/source-discovery/status"' federation/jarvis_contract.py
          grep -q '"/source-discovery/status"' deployment/runtime-scaffold-pack/services/xrp-hbar-apex/jarvis_contract.py
      - name: Build production API image
        run: docker build -t hub-jarvis-contract:test deployment/runtime-scaffold-pack/services/xrp-hbar-apex
      - name: Run ephemeral container contract smoke test
        run: |
          set -eu
          docker run -d --rm --name hub-jarvis-contract-test -p 18080:8080 hub-jarvis-contract:test
          trap 'docker logs hub-jarvis-contract-test || true; docker stop hub-jarvis-contract-test || true' EXIT
          python - <<'PY'
          import json
          import time
          import urllib.request

          urls = [
              'http://127.0.0.1:18080/health',
              'http://127.0.0.1:18080/.well-known/jarvis/health',
              'http://127.0.0.1:18080/.well-known/jarvis/capabilities',
              'http://127.0.0.1:18080/source-discovery/status',
          ]
          for _ in range(30):
              try:
                  with urllib.request.urlopen(urls[0], timeout=2) as response:
                      if response.status == 200:
                          break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('container did not become healthy')

          for url in urls:
              with urllib.request.urlopen(url, timeout=5) as response:
                  payload = json.load(response)
                  assert response.status == 200
                  if '/.well-known/jarvis/' in url:
                      assert payload['repository_id'] == 'hub'
                      assert payload['service_id'] == 'xrp-hbar-hub-runtime'
                      assert payload['contract_version'] == '1.0.0'
                  if '/source-discovery/status' in url:
                      assert payload['limits']['outbound_fetch'] is False
                      assert payload['limits']['automatic_promotion'] is False
          PY
      - name: Verify no secret files are introduced
        run: |
          test ! -f .env
          test ! -f deployment/runtime-scaffold-pack/.env.production
