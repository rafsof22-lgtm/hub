name: DigitalOcean Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digitalocean-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DIGITALOCEAN_HOST: 209.38.21.147
      DIGITALOCEAN_USER: root
      DIGITALOCEAN_PORT: "22"
      APP_DIR: /opt/xrp-hbar-apex
      BASE_URL: http://209.38.21.147

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate required deploy files exist
        run: |
          test -f deployment/runtime-scaffold-pack/deploy.sh
          test -f deployment/runtime-scaffold-pack/docker-compose.prod.yml
          test -f deployment/runtime-scaffold-pack/Caddyfile
          test -f deployment/runtime-scaffold-pack/.env.production.example
          test -f deployment/runtime-scaffold-pack/services/xrp-hbar-apex/Dockerfile
          test -f deployment/runtime-scaffold-pack/services/xrp-hbar-apex/requirements.txt
          test -f deployment/runtime-scaffold-pack/services/xrp-hbar-apex/app.py

      - name: Prepare SSH key
        env:
          DIGITALOCEAN_SSH_KEY: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
        run: |
          set -eu

          if [ -z "${DIGITALOCEAN_SSH_KEY:-}" ]; then
            echo "DIGITALOCEAN_SSH_KEY is missing or empty. Save the full private key as a GitHub Actions Secret."
            exit 1
          fi

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("DIGITALOCEAN_SSH_KEY", "")
          raw = raw.strip().lstrip("\ufeff")
          raw = raw.replace("\r\n", "\n").replace("\r", "\n").replace("\\r\\n", "\n").replace("\\n", "\n")

          cleaned = []
          for line in raw.splitlines():
              value = line.strip()
              if not value:
                  continue
              if value in {"COPY_START", "COPY_END", "```", "```text", "```pem"}:
                  continue
              if value.startswith("DIGITALOCEAN_SSH_KEY="):
                  value = value.split("=", 1)[1].strip().strip('"').strip("'")
              cleaned.append(value)

          key = "\n".join(cleaned).strip()
          if not key:
              raise SystemExit("DIGITALOCEAN_SSH_KEY became empty after cleanup")
          if key.startswith(("ssh-ed25519 ", "ssh-rsa ", "ecdsa-sha2-")):
              raise SystemExit("DIGITALOCEAN_SSH_KEY contains a public key. GitHub Actions needs the matching private key block, not the public key.")

          if "-----BEGIN " not in key or " PRIVATE KEY-----" not in key:
              try:
                  decoded = base64.b64decode("".join(key.split()), validate=True).decode("utf-8")
              except Exception:
                  decoded = ""
              if decoded:
                  key = decoded.strip()

          if "-----BEGIN " not in key or " PRIVATE KEY-----" not in key:
              raise SystemExit("DIGITALOCEAN_SSH_KEY must be a full private key block, or base64 of a full private key block")
          if "-----END " not in key or " PRIVATE KEY-----" not in key:
              raise SystemExit("DIGITALOCEAN_SSH_KEY is missing the END private key line")

          Path(".deploy_ssh_key").write_text(key + "\n")
          PY

          chmod 600 .deploy_ssh_key
          set +e
          keygen_output="$(ssh-keygen -y -f .deploy_ssh_key 2>&1 > .deploy_ssh_key.pub)"
          keygen_status=$?
          set -e

          if [ "$keygen_status" -ne 0 ]; then
            echo "ssh-keygen failed while validating DIGITALOCEAN_SSH_KEY"
            case "$keygen_output" in
              *passphrase*|*incorrect\ passphrase*)
                echo "DIGITALOCEAN_SSH_KEY appears to be passphrase-protected. Use a dedicated unencrypted deploy private key for GitHub Actions."
                ;;
              *invalid\ format*)
                echo "DIGITALOCEAN_SSH_KEY has an invalid private-key format after cleanup. Re-save the full private key block with line breaks preserved."
                ;;
              *error\ in\ libcrypto*)
                echo "DIGITALOCEAN_SSH_KEY is likely malformed or not an SSH private key."
                ;;
              *)
                echo "$keygen_output"
                ;;
            esac
            exit 1
          fi

          echo "deploy_key_fingerprint=$(ssh-keygen -lf .deploy_ssh_key.pub | awk '{print $2, $4}')"

      - name: Clear forced root password change
        env:
          DIGO1: ${{ secrets.DigO1 }}
          DIGO2: ${{ secrets.DigO2 }}
          DIGO3: ${{ secrets.DigO3 }}
        run: bash deployment/runtime-scaffold-pack/clear-expired-root-password.sh

      - name: Ensure droplet trusts deploy key
        env:
          DIGO1: ${{ secrets.DigO1 }}
          DIGO2: ${{ secrets.DigO2 }}
          DIGO3: ${{ secrets.DigO3 }}
        run: |
          set -eu

          target="${DIGITALOCEAN_USER}@${DIGITALOCEAN_HOST}"
          ssh_options="-i .deploy_ssh_key -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes -o BatchMode=yes -o PreferredAuthentications=publickey -o ConnectTimeout=15 -p ${DIGITALOCEAN_PORT}"

          if ssh $ssh_options "$target" 'true'; then
            echo "deploy_key_auth=already_trusted"
            exit 0
          fi

          if [ ! -s .deploy_ssh_key.pub ]; then
            echo ".deploy_ssh_key.pub was not created; cannot repair droplet authorized_keys"
            exit 1
          fi

          if ! command -v sshpass >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi

          install_with_password() {
            label="$1"
            password="$2"
            if [ -z "${password:-}" ]; then
              echo "password_secret_empty=$label"
              return 1
            fi

            deploy_pubkey="$(cat .deploy_ssh_key.pub)"
            echo "trying_password_secret=$label"
            set +e
            SSHPASS="$password" sshpass -e ssh \
              -o StrictHostKeyChecking=accept-new \
              -o PreferredAuthentications=password \
              -o PubkeyAuthentication=no \
              -o ConnectTimeout=15 \
              -p "$DIGITALOCEAN_PORT" \
              "$target" \
              "PUBKEY='$deploy_pubkey' bash -s" <<'REMOTE'
          set -eu
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          touch /root/.ssh/authorized_keys
          chmod 600 /root/.ssh/authorized_keys
          if ! grep -qxF "$PUBKEY" /root/.ssh/authorized_keys; then
            printf '%s\n' "$PUBKEY" >> /root/.ssh/authorized_keys
          fi
          REMOTE
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              echo "password_secret_used=$label"
              return 0
            fi

            echo "password_secret_failed=$label"
            return 1
          }

          if install_with_password DigO1 "$DIGO1"; then
            :
          elif install_with_password DigO2 "$DIGO2"; then
            :
          elif install_with_password DigO3 "$DIGO3"; then
            :
          else
            echo "No DigO password secret unlocked the droplet root account. The droplet still does not trust the deploy key."
            exit 1
          fi

          if ssh $ssh_options "$target" 'true'; then
            echo "deploy_key_auth=repaired_and_verified"
          else
            echo "Deploy key was written but key-based SSH verification still failed."
            exit 1
          fi

      - name: Deploy to DigitalOcean droplet over SSH
        run: |
          set -eu

          for required in DIGITALOCEAN_HOST DIGITALOCEAN_USER DIGITALOCEAN_PORT APP_DIR; do
            if [ -z "${!required}" ]; then
              echo "$required must be set in workflow env"
              exit 1
            fi
          done

          echo "deploy_target=${DIGITALOCEAN_USER}@${DIGITALOCEAN_HOST}:${DIGITALOCEAN_PORT} app_dir=${APP_DIR}"

          ssh -i .deploy_ssh_key \
            -o StrictHostKeyChecking=accept-new \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o PreferredAuthentications=publickey \
            -p "$DIGITALOCEAN_PORT" \
            "$DIGITALOCEAN_USER@$DIGITALOCEAN_HOST" \
            APP_DIR="$APP_DIR" 'bash -s' <<'REMOTE'
          set -eu

          REPO_URL="https://github.com/rafsof22-lgtm/hub.git"
          BRANCH="main"

          if [ ! -d "$APP_DIR/.git" ]; then
            mkdir -p "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"
          echo "[remote] synced_commit=$(git rev-parse HEAD)"

          chmod +x deployment/runtime-scaffold-pack/deploy.sh
          cd deployment/runtime-scaffold-pack
          ./deploy.sh
          REMOTE

      - name: Post-deploy live endpoint checks
        run: |
          set -eu

          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL must be set in workflow env"
            exit 1
          fi

          BASE_URL="${BASE_URL%/}"
          case "$BASE_URL" in
            http://*|https://*) ;;
            *)
              echo "BASE_URL must include http:// or https://"
              exit 1
              ;;
          esac

          check_endpoint() {
            url="$1"
            body_file="$(mktemp)"
            headers_file="$(mktemp)"
            status="000"
            if curl --max-time 20 --connect-timeout 10 --silent --show-error \
              --dump-header "$headers_file" --output "$body_file" --write-out "%{http_code}" "$url" > "$body_file.status"; then
              status="$(cat "$body_file.status")"
            else
              echo "curl_failed=true url=$url"
            fi

            echo "endpoint=$url status=$status"
            if [ "$status" = "301" ] || [ "$status" = "302" ] || [ "$status" = "307" ] || [ "$status" = "308" ]; then
              echo "redirect_location=$(awk 'tolower($1)==\"location:\" {print $2}' "$headers_file" | tr -d '\r' | tail -n 1)"
            fi
            echo "body_preview_start"
            head -c 700 "$body_file" | tr '\n' ' '
            echo
            echo "body_preview_end"

            case "$status" in
              2*) return 0 ;;
              *) return 1 ;;
            esac
          }

          failed=0
          for path in health ready deployment/status; do
            if ! check_endpoint "$BASE_URL/$path"; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "BASE_URL endpoint checks failed. Probing direct droplet HTTP for routing diagnostics."
            for path in health ready deployment/status; do
              curl -i --max-time 15 "http://${DIGITALOCEAN_HOST}/${path}" || true
            done
            exit 1
          fi
