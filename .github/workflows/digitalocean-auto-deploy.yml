name: DigitalOcean Auto Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digitalocean-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DIGITALOCEAN_HOST: '134.199.144.115'
      DIGITALOCEAN_USER: 'root'
      DIGITALOCEAN_PORT: '22'
      APP_DIR: '/opt/xrp-hbar-apex'
      BASE_URL: 'http://134.199.144.115'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate required deploy files exist
        run: |
          set -eu
          test -f deployment/runtime-scaffold-pack/deploy.sh
          test -f deployment/runtime-scaffold-pack/host-self-heal.sh
          test -f deployment/runtime-scaffold-pack/docker-compose.prod.yml
          test -f deployment/runtime-scaffold-pack/Caddyfile
          test -f deployment/runtime-scaffold-pack/.env.production.example
          test -f deployment/runtime-scaffold-pack/services/xrp-hbar-apex/Dockerfile
          test -f deployment/runtime-scaffold-pack/services/xrp-hbar-apex/requirements.txt
          test -f deployment/runtime-scaffold-pack/services/xrp-hbar-apex/app.py

      - name: Prepare SSH key
        env:
          DIGITALOCEAN_SSH_KEY: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
        run: |
          set -eu

          if [ -z "${DIGITALOCEAN_SSH_KEY:-}" ]; then
            echo "DIGITALOCEAN_SSH_KEY must be saved as an Actions Secret, not a Variable"
            exit 1
          fi

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ.get("DIGITALOCEAN_SSH_KEY", "")
          raw = raw.strip().lstrip("\ufeff")
          raw = raw.replace("\r\n", "\n").replace("\r", "\n")
          raw = raw.replace("\\r\\n", "\n").replace("\\n", "\n")

          cleaned = []
          for line in raw.splitlines():
              value = line.strip()
              if not value or value in {"COPY_START", "COPY_END", "```", "```text", "```pem"}:
                  continue
              if value.startswith("DIGITALOCEAN_SSH_KEY="):
                  value = value.split("=", 1)[1].strip().strip('"').strip("'")
              cleaned.append(value)

          key = "\n".join(cleaned).strip()
          if key.startswith(("ssh-ed25519 ", "ssh-rsa ", "ecdsa-sha2-")):
              raise SystemExit("DIGITALOCEAN_SSH_KEY contains a public key. GitHub Actions needs the private key block.")
          if "-----BEGIN " not in key or " PRIVATE KEY-----" not in key:
              try:
                  decoded = base64.b64decode("".join(key.split()), validate=True).decode("utf-8")
              except Exception:
                  decoded = ""
              if decoded:
                  key = decoded.strip()
          if "-----BEGIN " not in key or " PRIVATE KEY-----" not in key or "-----END " not in key:
              raise SystemExit("DIGITALOCEAN_SSH_KEY must contain a full private key block, or a base64-encoded private key block")

          Path(".deploy_ssh_key").write_text(key + "\n")
          PY

          chmod 600 .deploy_ssh_key
          ssh-keygen -y -f .deploy_ssh_key > .deploy_ssh_key.pub
          echo "deploy_key_fingerprint=$(ssh-keygen -lf .deploy_ssh_key.pub | awk '{print $2, $4}')"

      - name: Deploy to DigitalOcean droplet over SSH
        env:
          GMAIL_OAUTH_CLIENT_ID: ${{ secrets.GMAIL_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_OAUTH_CLIENT_SECRET: ${{ secrets.GMAIL_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.GMAIL_OAUTH_REFRESH_TOKEN }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_COMBINED_SECRET: ${{ secrets.Google }}
        run: |
          set -eu
          echo "deploy_target=${DIGITALOCEAN_USER}@${DIGITALOCEAN_HOST}:${DIGITALOCEAN_PORT} app_dir=${APP_DIR}"

          runtime_env_payload="$(mktemp)"
          python3 - "$runtime_env_payload" <<'PY'
          import json
          import os
          import shlex
          import sys
          from pathlib import Path

          aliases = {
              "GMAIL_OAUTH_CLIENT_ID": [
                  "GMAIL_OAUTH_CLIENT_ID",
                  "GOOGLE_OAUTH_CLIENT_ID",
                  "GOOGLE_CLIENT_ID",
                  "GMAIL_CLIENT_ID",
              ],
              "GMAIL_OAUTH_CLIENT_SECRET": [
                  "GMAIL_OAUTH_CLIENT_SECRET",
                  "GOOGLE_OAUTH_CLIENT_SECRET",
                  "GOOGLE_CLIENT_SECRET",
                  "GMAIL_CLIENT_SECRET",
              ],
              "GMAIL_OAUTH_REFRESH_TOKEN": [
                  "GMAIL_OAUTH_REFRESH_TOKEN",
                  "GOOGLE_OAUTH_REFRESH_TOKEN",
                  "GOOGLE_REFRESH_TOKEN",
                  "GMAIL_REFRESH_TOKEN",
              ],
          }

          google_fallback_keys = {
              "GMAIL_OAUTH_CLIENT_ID": {
                  "GMAIL_OAUTH_CLIENT_ID",
                  "GOOGLE_OAUTH_CLIENT_ID",
                  "GOOGLE_CLIENT_ID",
                  "GMAIL_CLIENT_ID",
                  "CLIENT_ID",
                  "OAUTH_CLIENT_ID",
              },
              "GMAIL_OAUTH_CLIENT_SECRET": {
                  "GMAIL_OAUTH_CLIENT_SECRET",
                  "GOOGLE_OAUTH_CLIENT_SECRET",
                  "GOOGLE_CLIENT_SECRET",
                  "GMAIL_CLIENT_SECRET",
                  "CLIENT_SECRET",
                  "OAUTH_CLIENT_SECRET",
              },
              "GMAIL_OAUTH_REFRESH_TOKEN": {
                  "GMAIL_OAUTH_REFRESH_TOKEN",
                  "GOOGLE_OAUTH_REFRESH_TOKEN",
                  "GOOGLE_REFRESH_TOKEN",
                  "GMAIL_REFRESH_TOKEN",
                  "REFRESH_TOKEN",
                  "OAUTH_REFRESH_TOKEN",
              },
          }

          def clean_value(value):
              if value is None:
                  return ""
              return str(value).strip().strip('"').strip("'")

          def parse_env_text(text):
              parsed = {}
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  if line.startswith("export "):
                      line = line[len("export "):].strip()
                  key, value = line.split("=", 1)
                  key = key.strip().upper()
                  value = value.strip()
                  try:
                      parts = shlex.split(value, posix=True)
                      if len(parts) == 1:
                          value = parts[0]
                  except ValueError:
                      value = value.strip('"').strip("'")
                  parsed[key] = clean_value(value)
              return parsed

          def flatten_json(value):
              flattened = []
              if isinstance(value, dict):
                  for key, child in value.items():
                      if isinstance(child, (dict, list)):
                          flattened.extend(flatten_json(child))
                      else:
                          flattened.append((str(key).upper(), clean_value(child)))
              elif isinstance(value, list):
                  for child in value:
                      flattened.extend(flatten_json(child))
              return flattened

          def parse_google_combined_secret(raw):
              raw = raw.strip().lstrip("\ufeff")
              raw = raw.replace("\r\n", "\n").replace("\r", "\n")
              raw = raw.replace("\\r\\n", "\n").replace("\\n", "\n")
              if not raw:
                  return {}

              source_pairs = []
              try:
                  payload = json.loads(raw)
              except json.JSONDecodeError:
                  payload = None
              if payload is not None:
                  source_pairs.extend(flatten_json(payload))
              source_pairs.extend(parse_env_text(raw).items())

              fallback = {}
              for target, candidate_keys in google_fallback_keys.items():
                  for key, value in source_pairs:
                      if key in candidate_keys and value:
                          fallback[target] = value
                          break
              return fallback

          google_fallback = parse_google_combined_secret(os.environ.get("GOOGLE_COMBINED_SECRET", ""))

          lines = []
          populated = []
          for target, names in aliases.items():
              selected = ""
              for name in names:
                  value = os.environ.get(name, "").strip()
                  if value:
                      selected = value
                      break
              if not selected:
                  selected = google_fallback.get(target, "")
              if selected:
                  lines.append(f"{target}={selected}\n")
                  populated.append(target)

          Path(sys.argv[1]).write_text("".join(lines))
          checked = ",".join(sorted({name for names in aliases.values() for name in names} | {"Google"}))
          print(f"gmail_secret_alias_names_checked={checked}")
          print(f"gmail_secret_targets_populated_count={len(populated)}")
          PY

          upload_path="/tmp/xrp_hbar_runtime_env_${GITHUB_RUN_ID:-manual}_${GITHUB_RUN_ATTEMPT:-0}"
          scp -i .deploy_ssh_key \
            -o StrictHostKeyChecking=accept-new \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o PreferredAuthentications=publickey \
            -P "$DIGITALOCEAN_PORT" \
            "$runtime_env_payload" \
            "$DIGITALOCEAN_USER@$DIGITALOCEAN_HOST:$upload_path"
          rm -f "$runtime_env_payload"

          ssh -i .deploy_ssh_key \
            -o StrictHostKeyChecking=accept-new \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o PreferredAuthentications=publickey \
            -p "$DIGITALOCEAN_PORT" \
            "$DIGITALOCEAN_USER@$DIGITALOCEAN_HOST" \
            APP_DIR="$APP_DIR" RUNTIME_ENV_UPLOAD="$upload_path" 'bash -s' <<'REMOTE'
          set -eu

          REPO_URL="https://github.com/rafsof22-lgtm/hub.git"
          BRANCH="main"

          if [ ! -d "$APP_DIR/.git" ]; then
            mkdir -p "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"
          echo "[remote] synced_commit=$(git rev-parse HEAD)"

          if [ -n "${RUNTIME_ENV_UPLOAD:-}" ] && [ -s "$RUNTIME_ENV_UPLOAD" ]; then
            env_file="$APP_DIR/deployment/runtime-scaffold-pack/.env.production"
            mkdir -p "$(dirname "$env_file")"
            touch "$env_file"
            chmod 600 "$env_file" || true
            python3 - "$env_file" "$RUNTIME_ENV_UPLOAD" <<'PY'
          import sys
          from pathlib import Path

          env_path = Path(sys.argv[1])
          upload_path = Path(sys.argv[2])
          managed_keys = {
              "GMAIL_OAUTH_CLIENT_ID",
              "GMAIL_OAUTH_CLIENT_SECRET",
              "GMAIL_OAUTH_REFRESH_TOKEN",
          }

          existing = []
          if env_path.exists():
              existing = env_path.read_text().splitlines()

          incoming = {}
          for line in upload_path.read_text().splitlines():
              if not line.strip() or line.lstrip().startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              key = key.strip()
              if key in managed_keys and value.strip():
                  incoming[key] = value.strip()

          kept = []
          for line in existing:
              key = line.split("=", 1)[0].strip() if "=" in line else ""
              if key in incoming:
                  continue
              kept.append(line)

          for key in sorted(incoming):
              kept.append(f"{key}={incoming[key]}")

          env_path.write_text("\n".join(kept).rstrip() + "\n")
          PY
            rm -f "$RUNTIME_ENV_UPLOAD"
            echo "[remote] gmail_runtime_env_alias_import=attempted"
          else
            rm -f "${RUNTIME_ENV_UPLOAD:-}" 2>/dev/null || true
            echo "[remote] gmail_runtime_env_alias_import=no_candidate_values"
          fi

          chmod +x deployment/runtime-scaffold-pack/host-self-heal.sh
          APP_DIR="$APP_DIR" REPO_URL="$REPO_URL" BRANCH="$BRANCH" deployment/runtime-scaffold-pack/host-self-heal.sh
          REMOTE

      - name: Post-deploy public proof gates
        run: |
          set -eu
          BASE_URL="${BASE_URL%/}"
          failed=0

          get_json() {
            url="$1"
            body_file="$(mktemp)"
            status="000"
            if curl --max-time 20 --connect-timeout 10 --silent --show-error --output "$body_file" --write-out "%{http_code}" "$url" > "$body_file.status"; then
              status="$(cat "$body_file.status")"
            fi
            echo "endpoint=$url status=$status"
            head -c 1200 "$body_file" | tr '\n' ' '
            echo
            case "$status" in 2*) return 0 ;; *) return 1 ;; esac
          }

          post_json() {
            url="$1"
            payload="$2"
            body_file="$(mktemp)"
            status="000"
            if curl --max-time 20 --connect-timeout 10 --silent --show-error \
              --header 'Content-Type: application/json' \
              --request POST \
              --data "$payload" \
              --output "$body_file" --write-out "%{http_code}" "$url" > "$body_file.status"; then
              status="$(cat "$body_file.status")"
            fi
            echo "endpoint=$url method=POST status=$status"
            head -c 1400 "$body_file" | tr '\n' ' '
            echo
            case "$status" in 2*) return 0 ;; *) return 1 ;; esac
          }

          require_ready_status() {
            url="$1"
            body_file="$(mktemp)"
            status="$(curl --max-time 20 --connect-timeout 10 --silent --show-error --output "$body_file" --write-out "%{http_code}" "$url" || true)"
            echo "endpoint=$url status=$status"
            cat "$body_file" | head -c 1600 | tr '\n' ' '
            echo
            python3 - "$body_file" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1]))
          if payload.get("status") != "ready_for_fetch_token_refresh_proven":
              raise SystemExit("Gmail runtime credentials are not token-refresh proven")
          PY
          }

          for path in \
            health \
            ready \
            deployment/status \
            email/newsletter/status \
            email/newsletter/sync/status \
            email/newsletter/claims/status \
            vti/status \
            vti/worker/status \
            evidence-pack/status \
            ops/dedupe-retry-backfill/status; do
            if ! get_json "$BASE_URL/$path"; then failed=1; fi
          done

          vti_payload='{"source_url":"https://ripple.com/solutions/stablecoin/","platform":"official-web-copied-link","title":"Ripple USD stablecoin copied-link smoke proof","transcript":"Manual transcript smoke for XRP HBAR Apex runtime proof.","ocr_text":"Visible-page OCR smoke for runtime proof."}'
          newsletter_payload='{"source_name":"Apex Newsletter Smoke","source_url":"https://ripple.com/solutions/stablecoin/","subject":"Newsletter smoke proof for RLUSD monitoring","received_at":"2026-07-16T10:28:00Z","summary":"Manual newsletter smoke: durable proof storage before live Gmail automation is claimed.","tags":["rlusd","newsletter-smoke","manual-intake"]}'
          claim_payload='{"source_proof_id":"workflow-smoke","text":"Ripple USD monitoring may produce newsletter claims. This route only extracts unverified claim candidates."}'
          sync_payload='{"source":"workflow-smoke","last_seen_proof_id":"workflow-smoke"}'
          vti_worker_payload='{"source_url":"https://ripple.com/solutions/stablecoin/","worker_stage":"queued"}'
          ops_payload='{"dedupe_key":"workflow-smoke","retry_count":0,"backfill_cursor":"workflow-cursor"}'

          if ! post_json "$BASE_URL/vti/smoke" "$vti_payload"; then failed=1; fi
          if ! get_json "$BASE_URL/vti/evidence/latest"; then failed=1; fi
          if ! post_json "$BASE_URL/email/newsletter/smoke" "$newsletter_payload"; then failed=1; fi
          if ! get_json "$BASE_URL/email/newsletter/proof/latest"; then failed=1; fi
          if ! post_json "$BASE_URL/email/newsletter/sync/checkpoint" "$sync_payload"; then failed=1; fi
          if ! post_json "$BASE_URL/email/newsletter/claims/extract" "$claim_payload"; then failed=1; fi
          if ! post_json "$BASE_URL/vti/worker/checkpoint" "$vti_worker_payload"; then failed=1; fi
          if ! get_json "$BASE_URL/evidence-pack/latest"; then failed=1; fi
          if ! post_json "$BASE_URL/ops/dedupe-retry-backfill/checkpoint" "$ops_payload"; then failed=1; fi

          if [ "$failed" -ne 0 ]; then
            echo "One or more non-Gmail public proof gates failed"
            exit 1
          fi

          require_ready_status "$BASE_URL/email/newsletter/gmail/status"
          gmail_fetch_payload='{"query":"category:primary newer_than:30d","max_results":3}'
          post_json "$BASE_URL/email/newsletter/gmail/fetch" "$gmail_fetch_payload"
          get_json "$BASE_URL/email/newsletter/gmail/proof/latest"
