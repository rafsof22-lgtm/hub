name: DigitalOcean Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digitalocean-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required deploy files exist
        run: |
          test -f deployment/runtime-scaffold-pack/deploy.sh
          test -f deployment/runtime-scaffold-pack/docker-compose.prod.yml
          test -f deployment/runtime-scaffold-pack/Caddyfile
          test -f deployment/runtime-scaffold-pack/.env.production.example
          test -f deployment/runtime-scaffold-pack/services/xrp-hbar-apex/Dockerfile
          test -f deployment/runtime-scaffold-pack/services/xrp-hbar-apex/app.py

      - name: Deploy to DigitalOcean droplet over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USER }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          port: ${{ secrets.DIGITALOCEAN_PORT }}
          script_stop: true
          script: |
            set -eu

            APP_DIR="${{ secrets.APP_DIR }}"
            REPO_URL="https://github.com/rafsof22-lgtm/hub.git"
            BRANCH="main"

            if [ -z "$APP_DIR" ]; then
              echo "APP_DIR secret is required"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            chmod +x deployment/runtime-scaffold-pack/deploy.sh
            cd deployment/runtime-scaffold-pack
            ./deploy.sh

      - name: Post-deploy live endpoint checks
        run: |
          set -eu
          BASE_URL="${{ secrets.BASE_URL }}"

          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL secret is required"
            exit 1
          fi

          curl --fail --silent --show-error "$BASE_URL/health" > /dev/null
          curl --fail --silent --show-error "$BASE_URL/ready" > /dev/null
          curl --fail --silent --show-error "$BASE_URL/deployment/status" > /dev/null
